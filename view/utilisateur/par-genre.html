  <style>
    /* Grille des genres avec cartes colorées */
    .grille-genres {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .carte-genre {
      border-radius: 14px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s;
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
    }
    .carte-genre:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(0,0,0,0.5); }
    .carte-genre.actif { border-color: var(--rouge-mada); }
    .carte-genre i { font-size: 2rem; margin-bottom: 10px; display: block; }
    .carte-genre span { font-size: 14px; font-weight: 600; color: #fff; }

    /* Couleurs des genres */
    .genre-action    { background: linear-gradient(135deg, #c0392b, #7b241c); }
    .genre-comedie   { background: linear-gradient(135deg, #f39c12, #8e6e0e); }
    .genre-horreur   { background: linear-gradient(135deg, #2c3e50, #1a252f); }
    .genre-romance   { background: linear-gradient(135deg, #e91e8c, #880e4f); }
    .genre-sf        { background: linear-gradient(135deg, #1565c0, #0d3c77); }
    .genre-thriller  { background: linear-gradient(135deg, #4a148c, #2a0f57); }
    .genre-animation { background: linear-gradient(135deg, #00695c, #004d40); }
    .genre-aventure  { background: linear-gradient(135deg, #2e7d32, #1b5e20); }

    /* Résultats de films filtrés */
    .titre-resultat { font-size: 20px; font-weight: 700; margin: 24px 0 16px; color: var(--blanc); }
    .grille-films {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 18px;
    }
    .carte-film {
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s;
      background: var(--gris-fonce);
    }
    .carte-film:hover { transform: scale(1.04); }
    .carte-film img { width: 100%; height: 230px; object-fit: cover; display: block; }
    .info-film { padding: 10px 12px; }
    .info-film h4 { font-size: 13px; font-weight: 600; color: var(--blanc); margin: 0 0 4px; }
    .info-film span { font-size: 11px; color: var(--gris-clair); }
  </style>
</head>
