  <style>
    /* Onglets de catégories */
    .barre-onglets {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      background: var(--gris-fonce);
      padding: 8px;
      border-radius: 14px;
    }
    .onglet-categorie {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--gris-clair);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .onglet-categorie:hover { background: rgba(255,255,255,0.06); color: var(--blanc); }
    .onglet-categorie.actif { background: var(--rouge-mada); color: #fff; }
    .onglet-categorie i { font-size: 16px; }

    /* Grille de contenus */
    .grille-contenu {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 18px;
    }
    .carte-contenu {
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s;
      background: var(--gris-fonce);
      position: relative;
    }
    .carte-contenu:hover { transform: scale(1.04); }
    .carte-contenu img { width: 100%; height: 230px; object-fit: cover; display: block; }
    .carte-contenu .badge-type {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--rouge-mada);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
    }
    .info-contenu { padding: 10px 12px; }
    .info-contenu h4 { font-size: 13px; font-weight: 600; color: var(--blanc); margin: 0 0 4px; }
    .info-contenu span { font-size: 11px; color: var(--gris-clair); }

    /* Statistiques de catégorie */
    .stats-categorie {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-item {
      background: var(--gris-fonce);
      border-radius: 12px;
      padding: 16px 22px;
      flex: 1;
      text-align: center;
    }
    .stat-item .chiffre { font-size: 28px; font-weight: 700; color: var(--rouge-mada); }
    .stat-item .libelle { font-size: 12px; color: var(--gris-clair); margin-top: 4px; }
  </style>
</head>
