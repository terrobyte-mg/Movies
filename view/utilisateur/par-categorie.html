<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MADAMOV - Par Catégorie</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../../style.css">
  <style>
    /* Onglets de catégories */
    .barre-onglets {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      background: var(--gris-fonce);
      padding: 8px;
      border-radius: 14px;
    }
    .onglet-categorie {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--gris-clair);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .onglet-categorie:hover { background: rgba(255,255,255,0.06); color: var(--blanc); }
    .onglet-categorie.actif { background: var(--rouge-mada); color: #fff; }
    .onglet-categorie i { font-size: 16px; }

    /* Grille de contenus */
    .grille-contenu {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 18px;
    }
    .carte-contenu {
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s;
      background: var(--gris-fonce);
      position: relative;
    }
    .carte-contenu:hover { transform: scale(1.04); }
    .carte-contenu img { width: 100%; height: 230px; object-fit: cover; display: block; }
    .carte-contenu .badge-type {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--rouge-mada);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
    }
    .info-contenu { padding: 10px 12px; }
    .info-contenu h4 { font-size: 13px; font-weight: 600; color: var(--blanc); margin: 0 0 4px; }
    .info-contenu span { font-size: 11px; color: var(--gris-clair); }

    /* Statistiques de catégorie */
    .stats-categorie {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-item {
      background: var(--gris-fonce);
      border-radius: 12px;
      padding: 16px 22px;
      flex: 1;
      text-align: center;
    }
    .stat-item .chiffre { font-size: 28px; font-weight: 700; color: var(--rouge-mada); }
    .stat-item .libelle { font-size: 12px; color: var(--gris-clair); margin-top: 4px; }
  </style>
</head>
<body class="utilisateur-theme">

  <div class="page-conteneur">

    <!-- BARRE LATÉRALE -->
    <aside class="barre-laterale">
      <div>
        <div class="logo">
          <i class="fa-solid fa-circle-play" style="color: var(--rouge-mada);"></i>
          MADAMOV
        </div>
        <div class="profil-section">
          <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=150" alt="Avatar" class="avatar-grand">
          <h4 id="nomUtilisateurConnecte">Théodoric</h4>
          <span class="badge-premium">Premium</span>
        </div>
        <nav style="margin-top: 20px;">
          <p class="menu-titre">Menu principal</p>
          <ul class="menu-liens">
            <li><a href="index.html"><i class="fa-solid fa-house-play"></i> <span>Films</span></a></li>
            <li class="sous-menu"><a href="par-genre.html"><i class="fa-solid fa-masks-theater"></i> <span>Par genre</span></a></li>
            <li class="sous-menu actif"><a href="par-categorie.html"><i class="fa-solid fa-list-ul"></i> <span>Par catégorie</span></a></li>
            <li class="sous-menu"><a href="par-date.html"><i class="fa-solid fa-calendar-days"></i> <span>Par date</span></a></li>
          </ul>
        </nav>
      </div>
      <div>
        <div class="baobab-silhouettes"></div>
        <ul class="menu-liens" style="border-top: 1px solid rgba(255,255,255,0.06); padding-top: 12px; margin-bottom: 10px;">
          <li><a href="parametres.html"><i class="fa-solid fa-sliders"></i> <span>Paramètres</span></a></li>
          <li><a href="../view/auth/connexion.html" ><i class="fa-solid fa-right-from-bracket" style="color: var(--rouge-mada);"></i> <span>Déconnexion</span></a></li>
        </ul>
      </div>
    </aside>

    <!-- ZONE PRINCIPALE -->
    <main class="zone-principale">
      <!-- En-tête -->
      <header class="en-tete" style="background: var(--fond-sombre);">
        <div style="display: flex; align-items: center; gap: 14px;">
          <button class="bouton-menu-mobile" ><i class="fa-solid fa-bars"></i></button>
          <div class="barre-recherche">
            <i class="fa-solid fa-search"></i>
            <input type="text" id="champRecherche" placeholder="Rechercher dans la catégorie..." oninput="filtrerContenu()">
          </div>
        </div>
        <div style="display: flex; align-items: center; gap: 14px;">
          <button class="btn-icone"><i class="fa-regular fa-bell"></i><span class="badge-notif">3</span></button>
          <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=60" alt="Avatar" class="avatar-petit">
        </div>
      </header>

      <div class="contenu-principal">
        <!-- Titre -->
        <div style="margin-bottom: 24px;">
          <h1 style="font-size: 26px; font-weight: 700; color: var(--blanc);">
            <i class="fa-solid fa-list-ul" style="color: var(--rouge-mada);"></i> Par Catégorie
          </h1>
          <p style="color: var(--gris-clair); font-size: 14px; margin-top: 6px;">Films, Séries et Animés — choisissez votre type de contenu.</p>
        </div>

        <!-- Statistiques -->
        <div class="stats-categorie">
          <div class="stat-item"><div class="chiffre">245</div><div class="libelle">Films disponibles</div></div>
          <div class="stat-item"><div class="chiffre">87</div><div class="libelle">Séries disponibles</div></div>
          <div class="stat-item"><div class="chiffre">63</div><div class="libelle">Animés disponibles</div></div>
        </div>

        <!-- Onglets de catégories -->
        <div class="barre-onglets">
          <button class="onglet-categorie actif" id="ongletFilms" >
            <i class="fa-solid fa-film"></i> Films
          </button>
          <button class="onglet-categorie" id="ongletSeries" >
            <i class="fa-solid fa-tv"></i> Séries
          </button>
          <button class="onglet-categorie" id="ongletAnimes" >
            <i class="fa-solid fa-dragon"></i> Animés
          </button>
        </div>

        <!-- Grille de contenus -->
        <div class="grille-contenu" id="grilleContenu"></div>
      </div>
    </main>
  </div>

  <script>
    // Catalogue de démonstration par catégorie (le backend fournira les vraies données)
    const catalogueParCategorie = {
      films: [
        { titre: "The Batman", annee: "2022", type: "Film", image: "https://image.tmdb.org/t/p/w500/74xTEgt7R36Fpooo50r9T25onhq.jpg" },
        { titre: "Top Gun: Maverick", annee: "2022", type: "Film", image: "https://image.tmdb.org/t/p/w500/62HCnUTziyWcpDabo8diEhkHPm3.jpg" },
        { titre: "Dune: Part 2", annee: "2024", type: "Film", image: "https://image.tmdb.org/t/p/w500/1pdfLvkbY9ohJlCjQH2CZjjYVvJ.jpg" },
        { titre: "Oppenheimer", annee: "2023", type: "Film", image: "https://image.tmdb.org/t/p/w500/8Gxv8gSFCU0XGDykEGv7zR1n2ua.jpg" },
        { titre: "Parasite", annee: "2019", type: "Film", image: "https://image.tmdb.org/t/p/w500/7IiTTgloJzvGI1TAYymCfbfl3vT.jpg" },
        { titre: "Black Panther", annee: "2022", type: "Film", image: "https://image.tmdb.org/t/p/w500/sv1xJUazXeYqALzczSZ3O6nkH75.jpg" }
      ],
      series: [
        { titre: "The Last of Us", annee: "2023", type: "Série", image: "https://image.tmdb.org/t/p/w500/uKvVjHNqB5VmOrdxqAt2F7J78ED.jpg" },
        { titre: "House of Dragon", annee: "2022", type: "Série", image: "https://image.tmdb.org/t/p/w500/z2yahl2uefxDCl0nogcRBstwruJ.jpg" },
        { titre: "Wednesday", annee: "2022", type: "Série", image: "https://image.tmdb.org/t/p/w500/9PFonBhy4cQy7Jz20NpMygczOkv.jpg" },
        { titre: "Stranger Things", annee: "2016", type: "Série", image: "https://image.tmdb.org/t/p/w500/x2LSRK2Cm7MZhjluni1msVJ3wDF.jpg" }
      ],
      animes: [
        { titre: "Demon Slayer", annee: "2019", type: "Animé", image: "https://image.tmdb.org/t/p/w500/reEMJA1uzscCbkpeRJeTT2bjqUp.jpg" },
        { titre: "Attack on Titan", annee: "2013", type: "Animé", image: "https://image.tmdb.org/t/p/w500/hTP1DtLGFamjfu8WqjnuQdP1n4i.jpg" },
        { titre: "Jujutsu Kaisen", annee: "2020", type: "Animé", image: "https://image.tmdb.org/t/p/w500/t1UaFlfn5R5ojqwZ9CkXDMWjCwq.jpg" },
        { titre: "One Piece", annee: "1999", type: "Animé", image: "https://image.tmdb.org/t/p/w500/e3NBGiAifW9Xt8xD5tpARskjccO.jpg" }
      ]
    };

    let categorieActive = "films";

    // Changer l'onglet de catégorie actif
    function changerCategorie(categorie) {
      categorieActive = categorie;
      // Mettre à jour l'onglet actif
      document.querySelectorAll(".onglet-categorie").forEach(o => o.classList.remove("actif"));
      document.getElementById("onglet" + categorie.charAt(0).toUpperCase() + categorie.slice(1)).classList.add("actif");
      // Afficher les contenus de la catégorie
      afficherContenu(catalogueParCategorie[categorie]);
    }

    // Afficher la grille de contenus
    function afficherContenu(listeContenu) {
      const conteneur = document.getElementById("grilleContenu");
      conteneur.innerHTML = listeContenu.map(element => `
        <div class="carte-contenu" >
          <img src="${element.image}" alt="${element.titre}" onerror="this.src='https://via.placeholder.com/160x230/1a1a2e/fff?text=${encodeURIComponent(element.titre)}'">
          <div class="badge-type">${element.type}</div>
          <div class="info-contenu">
            <h4>${element.titre}</h4>
            <span><i class="fa-regular fa-calendar" style="margin-right:4px;"></i>${element.annee}</span>
          </div>
        </div>
      `).join("");
    }

    // Filtrer les contenus par recherche
    function filtrerContenu() {
      const texte = document.getElementById("champRecherche").value.toLowerCase();
      document.querySelectorAll(".carte-contenu").forEach(carte => {
        const titre = carte.querySelector("h4").textContent.toLowerCase();
        carte.style.display = titre.includes(texte) ? "" : "none";
      });
    }

    // Initialisation au chargement
    window.addEventListener("DOMContentLoaded", () => {
      const nomUtilisateur = localStorage.getItem("nomUtilisateur") || "Théodoric";
      document.getElementById("nomUtilisateurConnecte").textContent = nomUtilisateur;
      afficherContenu(catalogueParCategorie.films);
    });
  </script>
</body>
</html>
